version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: autopilot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - autopilot_net

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: autopilot_api
    env_file:
      - ./backend/.env.production
    expose:
      - 8000
    depends_on:
      - redis
      - qdrant
    restart: always
    networks:
      - autopilot_net

  redis:
    image: redis:7-alpine
    container_name: autopilot_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    networks:
      - autopilot_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: autopilot_qdrant
    volumes:
      - qdrant_prod_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - autopilot_net

  certbot:
    image: certbot/certbot
    container_name: autopilot_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - autopilot_net

networks:
  autopilot_net:
    driver: bridge

volumes:
  redis_prod_data:
  qdrant_prod_data:
