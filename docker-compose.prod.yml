services:
  nginx:
    image: nginx:alpine
    container_name: autopilot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - autopilot_net

  postgres:
    image: postgres:15-alpine
    container_name: autopilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-autopilot_monster}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-autopilot_monster}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopilot_net

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: autopilot_api
    env_file:
      - path: ./backend/.env.production
        required: false
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - QDRANT_URL=http://qdrant:6333
      - DB_SYNCHRONIZE=false
      - NODE_ENV=production
    expose:
      - 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/api/v1/health/ready',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - autopilot_net

  redis:
    image: redis:7-alpine
    container_name: autopilot_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - autopilot_net

  minio:
    image: minio/minio:latest
    container_name: autopilot_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - autopilot_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: autopilot_qdrant
    volumes:
      - qdrant_prod_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - autopilot_net

  certbot:
    image: certbot/certbot
    container_name: autopilot_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - autopilot_net

networks:
  autopilot_net:
    driver: bridge

volumes:
  pg_prod_data:
  redis_prod_data:
  minio_prod_data:
  qdrant_prod_data:
