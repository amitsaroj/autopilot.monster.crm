name: Auto Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve
          echo "INSTANCE_ID=$(terraform output -raw instance_id)" >> $GITHUB_ENV

      - name: Build and Push Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}",
              "sudo docker pull ghcr.io/${{ github.repository }}/api:latest",
              "sudo docker stop api || true",
              "sudo docker rm api || true",
              "sudo docker run -d --name api -p 80:80 ghcr.io/${{ github.repository }}/api:latest"
            ]' \
            --region ap-south-1
