events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # GZIP setup
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Rate Limiting Zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --------------------------------------------------
    # HTTP Server (always active)
    # Serves Certbot challenges + proxies API on port 80
    # After SSL cert is generated, uncomment the redirect
    # --------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name api.autopilot.monster;

        # Certbot challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # STEP 1: Initially proxy API directly on port 80
        # STEP 2: After SSL cert exists, comment this block and uncomment redirect below
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # STEP 2: Uncomment this after SSL cert is generated
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

    # --------------------------------------------------
    # HTTPS Server (uncomment after SSL cert is generated)
    # Run this on EC2 to get the cert:
    #   sudo docker compose -f docker-compose.prod.yml run --rm certbot \
    #     certbot certonly --webroot -w /var/www/certbot \
    #     -d api.autopilot.monster --non-interactive --agree-tos \
    #     -m your-email@example.com
